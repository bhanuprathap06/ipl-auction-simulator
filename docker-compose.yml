version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: ipl_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ipl_auction

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ipl_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/ipl_auction
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ipl_client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
